add_by_isbn:
  name: Přidat knihu podle ISBN
  description: Vyhledá metadata knihy v Open Library a přidá ji do knihovničky.
  fields:
    isbn:
      name: ISBN
      description: ISBN kód knihy (10 nebo 13 číslic) nebo její přesný název.
      required: true
      example: "9788025712345"

update_book:
  name: Aktualizovat knihu
  description: Změní stav, hodnocení nebo poznámky u existující knihy.
  fields:
    book_id:
      name: ID knihy
      description: Interní ID knihy.
      required: true
    status:
      name: Stav
      description: "Možnosti: to_read, reading, read"
      example: "read"
    is_read:
      name: Přečteno
      description: Logická hodnota (true/false).
      example: true
    date_read:
      name: Datum přečtení
      description: Datum ve formátu RRRR-MM-DD.
      example: "2026-04-23"
    rating:
      name: Hodnocení
      description: Počet hvězdiček (0-5).
      example: 5
    notes:
      name: Poznámky
      description: Textová poznámka ke knize.
    lent_to:
      name: Půjčeno komu
      description: Jméno osoby, které byla kniha půjčena.
    count:
      name: Počet
      description: Počet kusů v knihovně.
      example: 1
    genre:
      name: Žánr
      description: Seznam žánrů.

delete_book:
  name: Smazat knihu
  description: Odstraní knihu z knihovničky.
  fields:
    book_id:
      name: ID knihy
      description: Interní ID knihy.
      required: true

loan_book:
  name: Půjčit knihu
  description: Přidá novou výpůjčku ke konkrétnímu titulu.
  fields:
    book_id:
      name: ID knihy
      description: Interní ID knihy.
      required: true
    person:
      name: Osoba
      description: Jméno osoby, které knihu půjčujete.
      required: true
    until:
      name: Termín vrácení
      description: Datum, do kdy má být kniha vrácena (RRRR-MM-DD).

return_book:
  name: Vrátit knihu
  description: Odstraní výpůjčku (vráti knihu na polici).
  fields:
    book_id:
      name: ID knihy
      description: Interní ID knihy.
      required: true
    person:
      name: Osoba
      description: Jméno osoby, která knihu vrací (nepovinné, smaže první nalezenou půjčku).
